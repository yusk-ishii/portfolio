order: 1
title: calm coffee
description: '"静けさ"をコンセプトにした、七里ヶ浜にある喫茶店のWebサイト'
date: '2025.07 – 2025.08'
scope: Web Design, Development
stack: 'Figma, Astro.js, Three.js, GSAP, Lenis, Swup'
heroImage: ./top.jpg
thumbnailImage: ./thumbnail.jpg
github: https://github.com/yusk-ishii/calm-coffee-web
website: https://yusk-ishii.github.io/calm-coffee-web
overview: >
  日常の喧騒から離れ、静かな時間を求める人たちに向けて、Webを通じて「静けさ」という感情価値を届けられないか。そんな問いを起点に制作したのが、鎌倉・七里ヶ浜にある架空の喫茶店「calm coffee」のWebサイトです。コンセプト設計からUIデザイン・実装まで一貫して手がけました。
sections:
  - heading: |
      下流から上流へ。
      ユーザー体験から想像して作ったWebサイト。
    body:
      - >
        これまでフロントエンドとして、体験設計やUIデザインなどの上流工程に携わる機会は少なく、デザインが固まった段階から実装を進めることがほとんどでした。しかし仕事として取り組む中で、次第に「なぜこの体験になっているのか」「なぜこのUIなのか」といった、体験そのものを設計するプロセスに興味を持つようになりました。
      - >
        そこで取り組んだのが、鎌倉・七里ヶ浜にある架空の喫茶店「calm coffee」のWebサイト制作です。出発点となったのは、「この場所に喫茶店をつくるなら、どんな時間や空気感を届けるべきだろう？」という問いでした。どんな人が訪れ、どんな時間を過ごすのか。そのイメージを丁寧に膨らませながら、店名・ロゴ・コンセプトを設計し、ブランド体験を軸にサイト構成・UIデザイン・実装まで一貫して制作しました。
    image: ./section-1.png

  - heading: |
      閲覧ストーリーと認知を起点に、
      サイト構成を設計。
    body:
      - >
        calm coffeeを訪れるユーザーを、「新規ユーザー」と「リピーター」の2つに定義しました。新規ユーザーは、SNSや口コミを通じてお店の存在を知ったばかりの段階にあります。「どんなお店だろう？」という興味が生まれた段階では、まずお店の雰囲気や空気感を写真やコピーで情緒的に訴求し、興味を持ってもらうことが先だと考えました。そのためFVでは商品を訴求するのではなく、空間・風景・世界観を先に体感させることで「行ってみたい」という気持ちを引き出す構成にしました。
      - >
        一方、リピーターには営業情報や新着情報への最短導線を設計しました。それぞれの動機に合わせて情報の優先順位と導線を整理し、ワイヤーフレームに落とし込んでから設計を進めました。
    image: ./section-2.png

  - heading: |
      ユーザー体験を軸に、
      デザインと実装を一貫して作り込む。
    body:
      - >
        静けさを、どうビジュアルで表現するか。この問いに向き合いながら、デザイントークンを作成し、色・タイポグラフィ・余白を統一することでサイト全体に一貫性のあるUIを実現しました。彩度を抑えた3色のみで構成したカラーパレットは、余計な主張をせず、静けさと落ち着きを視覚的に表現することを意識しています。
      - >
        FVはユーザーが最初に受け取る体験であり、ここで「お店の空気感」をどれだけ早く届けられるかが重要だと考えました。様々なパターンを試作した結果、Three.jsによる波のような画像切り替えアニメーションを採用しています。波を連想させるゆるやかな動きが、静けさのコンセプトと最も一致すると判断しました。また、Lenisによる滑らかなスクロールやSwupによる柔らかいページ遷移など、細部まで「静けさ」を体感できるよう作り込みました。
    video: ./movie
