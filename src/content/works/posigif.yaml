order: 3
title: ポジギフ
tags: UX Research, Product Strategy, UI Design
description: ギフト選びの迷いを、自信に変えるAIギフト提案アプリ
date: '2025.10 – 2026.03'
scope: UX Research, Product Strategy, UI Design
stack: 'Figma, FigJam, Notion, ChatGPT'
overview: >
  多忙な現代人にとって、ギフト選びは「感謝を伝えたい」という気持ちとは裏腹に消耗する体験になりがちです。時間の制約・情報過多・自分のセンスへの不安が重なり、多くの人が「失敗しないこと」を優先した選択をしています。リサーチを通じて、課題の本質は「選択肢を探せない」ことではなく、「これが正解だ」という確信を持てないことにあると定義し、AIギフト提案アプリ「ポジギフ」を設計しました。UI/UXコースの課題として、0からプロダクトを企画し、UXリサーチから画面設計、UIデザインまで一貫して行いました。最終成果物としてFigmaプロトタイプを制作しています。
sections:
  - heading: |
      喜んでほしい。
      その気持ちが、選択を難しくする。
    body:
      - >
        「相手を喜ばせたい」という気持ちが強いほど、ギフト選びは難しくなります。喜ばせたいからこそ相手の好みが気になり、失敗が怖くなります。検索すれば「おすすめ30選」のような記事が次々と出てきますが、それらは選ぶ手がかりではなく、「選ばなければならない選択肢」として積み上がっていくばかりです。調べれば調べるほど、「どれが相手への正解なのか」が分からなくなっていきます。
      - >
        その帰結として起きるのが「納得感の欠如」です。「本当に喜んでもらえるか分からない」「センスがないと思われるのが怖い」。こうした不安の結果として、多くの人が「無難なものに落ち着く」という選択をしています。

  - heading: |
      ユーザーが求めているのは、
      選択肢ではなく確信。
    body:
      - >
        市場分析とユーザーインタビューを通じて、ギフト選びにおける課題の背景とユーザー心理を調査しました。既存のギフトECサービスは多くの選択肢を提供している一方で、贈る相手との関係性や気持ちまでは十分に反映できていないと考え、実際のユーザーがどこで迷い、何に不安を感じているのかを探りました。
      - >
        インタビューで繰り返し聞こえてきたのは、「相手の好みは分かるのに、具体的に何を買えば正解なのか判断できない」という声でした。贈る相手のジャンルや方向性は見えているものの、その中から「これが相手にとっての最適解だ」と判断する根拠を持てないという実態が見えてきました。この発見から、課題の本質は「選択肢を探せないこと」ではなく、「これが正解だ」という確信を持てないことにあると定義しました。

  - heading: 洞察をもとに、コア機能を定める。
    body:
      - >
        リサーチで定義した洞察は、「ユーザーは選択肢ではなく、確信を求めている」というものでした。ユーザーが確信を持つためには、まず相手との関係性や好みを把握する必要があります。関係性・シーン・相手の好みやライフスタイルを質問によって引き出し、その情報をもとにAIが提案を生成する「質問によるAI分析機能」をコア機能として設計しました。
      - >
        しかし、提案が出るだけでは十分ではありません。「なぜこれが相手に合うのか」という根拠がなければ、確信は生まれません。そこで「理由付きの提案」を2つ目のコア機能として設定しました。候補を示すだけでなく選定理由も併せて提示することで、ユーザーが「これが正解だ」と納得しながら選べる体験を目指しました。

  - heading: 理由を添えることで、選択が確信に変わる。
    body:
      - >
        ユーザーは、自分で選んだという感覚を大切にします。だからこそ、AIが答えを押しつけるのではなく、理由とともに候補を提示するアドバイザー型UIを採用しました。
      - >
        提案画面では、3人のAIアドバイザーがそれぞれ異なる視点からギフトを推薦する構成にしました。また、提案をよりパーソナルなものとして感じてもらうため、アドバイザーには3Dアバターを採用しました。「誰かが自分のために考えてくれた」という感覚を生み出しながら、各提案には選定理由も併せて提示することで、ユーザーが「これが正解だ」と自ら確信できる体験を目指しました。
      - >
        カラーパレットは、ネイビー・オレンジ・ホワイトの3色で構成しています。ネイビーはAIによる分析の知性と信頼感を、オレンジはギフトを選ぶ楽しさと温かみを表現しました。「賢く、でも温かい」というサービスの二面性を、色で体現することを意識しました。
