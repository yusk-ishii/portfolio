order: 2
title: Hachiue
description: 店舗リニューアルに合わせて立ち上げた、観葉植物専門店のWebサイト
date: '2025.10'
scope: Web Design, Development
stack: 'Figma, Astro.js, GSAP, Lenis, Lightroom'
heroImage: ./top.jpg
thumbnailImage: ./thumbnail.jpg
github: https://github.com/yusk-ishii/hachiue-web
website: https://yusk-ishii.github.io/hachiue-web/
overview: >
  都市生活者に「植物のある暮らし」を自然に取り入れてもらうことをコンセプトにした、架空の観葉植物専門店「Hachiue」のWebサイトです。店舗リニューアルのタイミングに合わせ、Instagramでは伝えきれないお店の想いやサービス内容を届けることを目的にブランドの言語化からUIデザイン・実装まで一貫して制作しました。
sections:
  - heading: Webサイトだからこそ、届けられるものがある。
    body:
      - >
        本制作は、店舗リニューアルに合わせてサービスサイトを立ち上げるという課題仕様のもとで取り組みました。前提として、すでにInstagramで情報発信を行い、ある程度の認知を得ている状態からのスタートでした。
      - >
        しかしInstagramはニュース的な情報発信には適している一方、お店の雰囲気やコンセプト、サービスへの想いといった「じっくり伝えるべき情報」は見過ごされがちです。そこでWebサイトの役割を「Instagramを補完するメディア」と定義し、ブランドへの共感を生み出すコンテンツ設計に取り組みました。

  - heading: ブランドの想いを、言葉にする。
    body:
      - >
        ブランドの想いを届けるために、まず取り組んだのが言葉の設計です。
      - >
        ブランドが伝えたいことをリード文として書き出しながら、言葉の核心を探りました。「自分らしい暮らし」「わたしらしい空間」「あなたのペース」。書き続けるうちに見えてきたのは、観葉植物はただ飾るものではなく、共に息づきながら暮らしを彩る存在だということでした。観葉植物を「相棒」と表現したのも、その関係性を言語化したいという思いからです。その核心を一言に絞ったのが、キャッチコピー「my room, my green.」です。
    image: ./section-2.png

  - heading: 言葉で設計した想いを、ビジュアルで表現する。
    body:
      - >
        言葉で設計したブランドの想いを、視覚でも一貫して体感できるよう、デザインと素材にこだわりました。写真はLightroomで色味を統一し、サイト全体に自然で落ち着いた空気感が流れるよう微調整しています。背景にはノイズテクスチャをfixedで敷くことで、デジタルでありながら有機的な質感を表現しました。ブランドカラーには自然・落ち着き・知性を連想させる深緑を採用し、筆記体のロゴと組み合わせることで、人の手の温かみや柔らかなつながりを感じさせるトンマナに仕上げました。
      - >
        またスマートフォンでのブラウザバーの色やテキスト選択時の色もブランドカラーに統一し、細部まで世界観を途切れさせない設計にしています。
    image: ./section-3.png
