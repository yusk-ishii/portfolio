order: 4
title: Okibi
tags: Concept Design, Brand Strategy, UX Design
description: 並べて始まる、二人の時間アプリ
date: '2026.03 – 2026.04'
scope: Concept Design, Brand Strategy, UX Design
stack: 'Figma, Notion, ChatGPT, Claude'
overview: >
  会話中についスマホを手に取ってしまうファビング（Phubbing）という行為は、私たちの日常に自然と入り込んでいます。悪気なく起こる一方で、深刻なトラブルではないからこそ指摘しにくく、二人でいる時間に静かな溝をつくることがあります。そこで、「スマホを置くために、スマホを使う」という逆説をコンセプトに生まれたのが、二人のスマホを横に並べると焚き火が灯るアプリ「Okibi」です。本制作では、コンセプト設計からブランド構築、体験設計までを一貫して手がけました。
sections:
  - heading: スマホを置くために、スマホを使う。
    body:
      - >
        会話中にスマホを見てしまうことは、多くの場合、本人も気づいていません。悪意がなく、無意識で起こるため、指摘する側も受け取る側も行動を変えるきっかけをつくりにくい状況です。
      - >
        「スマホを置くために、スマホを使う」というコンセプトの核心は、「我慢」ではなく「仕組み」で解決するという発想です。スクリーンタイム制限のような強制的な遮断ではなく、二人で自然に選べる体験として設計することで、義務感なく続けたいと思える仕組みを目指しました。
      - >
        この発想は、既存の対策に対する違和感から生まれています。通知をオフにする、スマホをしまう。いずれも意志力に委ねるアプローチです。しかし気づけばまた手が伸びてしまうのがスマホです。だからこそ、スマホを「置くための道具」ではなく「始めるための道具」に変えることに意味がありました。

  - heading: 並べるだけで、始まる。
    body:
      - >
        二人のスマホをくっつけると焚き火が灯ります。パチパチという音とともに炎が現れ、スマホに向いていた視線が少しずつ相手へ向いていきます。特別な操作は必要ありません。ただ並べるだけで、会話に向き合うきっかけが生まれます。
      - >
        離すと「今日は○分」という時間だけが記録され、何を話したかは残りません。会話の内容をデータ化しないのは意図的な設計です。Okibiが積み重ねるのは「ともに過ごした時間」だけ。その数字が、自然と「またやろう」というきっかけになることを目指しました。

  - heading: 熾火のように、静かに灯り続ける。
    body:
      - >
        Okibi（熾火）とは、炎が落ち着いた後に赤く光る炭火のことです。激しく燃え上がる炎ではなく、静かに、しかし確かな熱を持ち続ける火を指します。大きな感動よりも、日常の中でじわじわと育まれるつながりを象徴したいという思いから、この名前を選びました。
      - >
        この世界観を伝えるため、Instagram広告とWebのファーストビューを制作しました。ビジュアルは、深い紫を背景に温かなオレンジの炎を配置した構成にしました。デジタルの冷たさを感じさせる暗い背景と、アナログの温もりを宿す炎の対比が、「スマホを使って温かい時間をつくる」というコンセプトをそのまま体現しています。「静かな」「温かい」「自然な」をブランドの軸に置き、押しつけがましさや騒がしさとは距離を置いた世界観を一貫して設計しました。
