pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,astro,js,mjs,json,yaml,yml,css}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: '*.{ts,astro,js,mjs}'
      run: npx eslint {staged_files}

pre-push:
  commands:
    typecheck:
      run: npx astro check
